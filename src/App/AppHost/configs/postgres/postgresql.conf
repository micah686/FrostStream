# FrostStream PostgreSQL configuration.
#
# Loaded via:  postgres -c config_file=/etc/postgresql/postgresql.conf
# (see src/App/AppHost/StartPostgres.cs). This replaces the server's default
# postgresql.conf, so it must set everything the container needs — hence
# listen_addresses below. PostgreSQL built-in defaults apply to anything omitted.
#
# Purpose: enable the physical backup + point-in-time-recovery features used by
# src/App/BackupTool (the `full` and `wal-archive` modes). See
# docs/Markdown/BACKUP_RESTORE.md.

# Accept connections from outside the container (Aspire maps the port to the host).
listen_addresses = '*'

# --- Write-Ahead Log / replication ---------------------------------------------
# Required for pg_basebackup (`full` mode). These match PostgreSQL's own defaults
# but are pinned here so the behavior is explicit and stable.
wal_level = replica
max_wal_senders = 10

# --- Continuous WAL archiving (PITR) -------------------------------------------
# archive_mode requires a server restart to take effect; Aspire recreates the
# container when this file changes. Each completed segment is copied into the
# shared /wal-archive bind mount (mounted from <storage-root>/wal-archive on the
# host) alongside a `<segment>.sha256` sidecar, which is exactly the format
# BackupTool's wal-archive validator and PITR restore_command expect.
#
# The command is idempotent: if a segment is already archived, PostgreSQL treats
# that as success instead of retrying forever after a container restart. Keep
# /wal-archive writable by the container. The final chmod makes segments
# world-readable so the BackupTool process (which runs as the host user, not the
# container's postgres user under rootless podman) can read them for verification
# and restore.
archive_mode = on
archive_command = 'if test -f /wal-archive/%f; then true; else cp %p /wal-archive/%f && sha256sum /wal-archive/%f | cut -c1-64 > /wal-archive/%f.sha256 && chmod 0644 /wal-archive/%f /wal-archive/%f.sha256; fi'
