# PostgreSQL client authentication for FrostStream's private container network.
# pg_basebackup uses the replication protocol, which is not covered by a normal
# "host all all" database rule.
local   all             all                                     scram-sha-256
host    replication     all             0.0.0.0/0               scram-sha-256
host    replication     all             ::/0                    scram-sha-256
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
