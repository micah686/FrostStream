services:
  aspire-docker-demo-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  nats:
    image: "docker.io/library/nats:2.14"
    command:
      - "--user"
      - "nats"
      - "--pass"
      - "${NATS_PASSWORD}"
      - "-c"
      - "/etc/nats/nats.conf"
    expose:
      - "4222"
      - "8222"
      - "9222"
    volumes:
      - type: "bind"
        target: "/etc/nats/nats.conf"
        source: "${NATS_BINDMOUNT_0}"
        read_only: true
      - type: "bind"
        target: "/etc/nats/certs/ws-cert.pem"
        source: "${NATS_BINDMOUNT_1}"
        read_only: true
      - type: "bind"
        target: "/etc/nats/certs/ws-key.pem"
        source: "${NATS_BINDMOUNT_2}"
        read_only: true
    networks:
      - "aspire"
#  nats-ui:
#    image: "klinux/nats-ui:0.4.0"
#    environment:
#      PORT: "8080"
#      BASE_URL: "http://localhost:8080"
#      NATS_URL: "nats://nats:${NATS_PASSWORD}@nats:4222"
#      ADMIN_USER: "admin"
#      ADMIN_PASS: "admin"
#      JWT_SECRET: "57fc8318-64e3-4eb4-88fb-ab091f3977ca"
#      ConnectionStrings__nats: "nats://nats:${NATS_PASSWORD}@nats:4222"
#      NATS_HOST: "nats"
#      NATS_PORT: "4222"
#      NATS_USERNAME: "nats"
#      NATS_PASSWORD: "${NATS_PASSWORD}"
#      NATS_URI: "nats://nats:${NATS_PASSWORD}@nats:4222"
#    expose:
#      - "8080"
#    networks:
#      - "aspire"
  postgres:
    image: "docker.io/library/postgres:18.3"
    command:
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql"
        source: "apphost-feed4158f1-postgres-data"
        read_only: false
      - type: "bind"
        target: "/etc/postgresql/postgresql.conf"
        source: "${POSTGRES_BINDMOUNT_0}"
        read_only: true
      - type: "bind"
        target: "/wal-archive"
        source: "${POSTGRES_BINDMOUNT_1}"
        read_only: false
    networks:
      - "aspire"
  postgres-init:
    image: "docker.io/library/postgres:18.3"
    command:
      - "sh"
      - "-c"
      - "until pg_isready -h postgres -U \"$${POSTGRES_USER}\"; do sleep 1; done; for db in froststreamdb authentikdb openfgadb; do createdb -h postgres -U \"$${POSTGRES_USER}\" \"$${db}\" 2>/dev/null || true; done"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      PGPASSWORD: "${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: "service_started"
    networks:
      - "aspire"
  openbao:
    image: "openbao/openbao:2.5.5"
    command:
      - "server"
      - "-dev"
      - "-dev-root-token-id"
      - "froststream-dev-root"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "froststream-dev-root"
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    expose:
      - "8200"
    networks:
      - "aspire"
  typesense:
    image: "typesense/typesense:30.2"
    environment:
      TYPESENSE_DATA_DIR: "/data"
      TYPESENSE_API_KEY: "froststream-dev-key"
      TYPESENSE_ENABLE_CORS: "true"
    expose:
      - "8108"
    volumes:
      - type: "volume"
        target: "/data"
        source: "typesense-data"
        read_only: false
    networks:
      - "aspire"
  authentik:
    image: "ghcr.io/goauthentik/server:2026.5.3"
    command:
      - "server"
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_POSTGRESQL__HOST: "postgres"
      AUTHENTIK_POSTGRESQL__PORT: "5432"
      AUTHENTIK_POSTGRESQL__USER: "${POSTGRES_USER}"
      AUTHENTIK_POSTGRESQL__PASSWORD: "${POSTGRES_PASSWORD}"
      AUTHENTIK_POSTGRESQL__NAME: "authentikdb"
      AUTHENTIK_BOOTSTRAP_EMAIL: "admin@localhost"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
      AUTHENTIK_BOOTSTRAP_TOKEN: "${AUTHENTIK_BOOTSTRAP_TOKEN}"
      AUTHENTIK_CLIENT_ID: "froststream-bff"
      AUTHENTIK_CLIENT_SECRET: "${AUTHENTIK_CLIENT_SECRET}"
    expose:
      - "9000"
    ports:
      - "9000:9000"
    volumes:
      - type: "bind"
        target: "/blueprints/froststream.yaml"
        source: "${AUTHENTIK_BINDMOUNT_0}"
        read_only: true
    depends_on:
      postgres-init:
        condition: "service_completed_successfully"
    networks:
      - "aspire"
  authentik-worker:
    image: "ghcr.io/goauthentik/server:2026.5.3"
    command:
      - "worker"
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_POSTGRESQL__HOST: "postgres"
      AUTHENTIK_POSTGRESQL__PORT: "5432"
      AUTHENTIK_POSTGRESQL__USER: "${POSTGRES_USER}"
      AUTHENTIK_POSTGRESQL__PASSWORD: "${POSTGRES_PASSWORD}"
      AUTHENTIK_POSTGRESQL__NAME: "authentikdb"
      AUTHENTIK_BOOTSTRAP_TOKEN: "${AUTHENTIK_BOOTSTRAP_TOKEN}"
      AUTHENTIK_CLIENT_ID: "froststream-bff"
      AUTHENTIK_CLIENT_SECRET: "${AUTHENTIK_CLIENT_SECRET}"
    volumes:
      - type: "bind"
        target: "/blueprints/froststream.yaml"
        source: "${AUTHENTIK_WORKER_BINDMOUNT_0}"
        read_only: true
    depends_on:
      postgres-init:
        condition: "service_completed_successfully"
    networks:
      - "aspire"
  openfga-migrate:
    image: "openfga/openfga:v1.18.0"
    command:
      - "migrate"
    environment:
      OPENFGA_DATASTORE_ENGINE: "postgres"
      OPENFGA_DATASTORE_URI: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD_URLENCODED}@postgres:5432/openfgadb?sslmode=disable"
    depends_on:
      postgres-init:
        condition: "service_completed_successfully"
    networks:
      - "aspire"
  openfga:
    image: "openfga/openfga:v1.18.0"
    command:
      - "run"
    environment:
      OPENFGA_DATASTORE_ENGINE: "postgres"
      OPENFGA_DATASTORE_URI: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD_URLENCODED}@postgres:5432/openfgadb?sslmode=disable"
      OPENFGA_PLAYGROUND_ENABLED: "true"
    expose:
      - "8080"
    depends_on:
      openfga-migrate:
        condition: "service_completed_successfully"
      postgres-init:
        condition: "service_completed_successfully"
    networks:
      - "aspire"
#  openfga-studio:
#    image: "ghcr.io/prakashm88/openfga-studio:latest"
#    environment:
#      DISABLE_LOCAL_OPENFGA: "true"
#      OPENFGA_ENDPOINT: "http://openfga:8080"
#    expose:
#      - "3000"
#    depends_on:
#      openfga:
#        condition: "service_started"
#    networks:
#      - "aspire"
  pot-provider:
    image: "brainicism/bgutil-ytdlp-pot-provider:1.3.1"
    expose:
      - "4416"
    networks:
      - "aspire"
  databridge:
    image: "${DATABRIDGE_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ConnectionStrings__froststreamdb: "Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=froststreamdb"
      FROSTSTREAMDB_HOST: "postgres"
      FROSTSTREAMDB_PORT: "5432"
      FROSTSTREAMDB_USERNAME: "${POSTGRES_USER}"
      FROSTSTREAMDB_PASSWORD: "${POSTGRES_PASSWORD}"
      FROSTSTREAMDB_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/froststreamdb"
      FROSTSTREAMDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/froststreamdb"
      FROSTSTREAMDB_DATABASENAME: "froststreamdb"
      ConnectionStrings__nats: "nats://nats:${NATS_PASSWORD}@nats:4222"
      NATS_HOST: "nats"
      NATS_PORT: "4222"
      NATS_USERNAME: "nats"
      NATS_PASSWORD: "${NATS_PASSWORD}"
      NATS_URI: "nats://nats:${NATS_PASSWORD}@nats:4222"
      OpenBao__Address: "http://openbao:8200"
      OpenBao__Token: "froststream-dev-root"
      Typesense__Url: "http://typesense:8108"
      Typesense__ApiKey: "froststream-dev-key"
      FROSTSTREAM_STORAGE_ROOT: "/home/micah/RiderProjects/FrostStream/data"
      SINGLE_USER_MODE: "false"
      PotBroker__Enabled: "true"
      PotBroker__ProviderUrl: "http://pot-provider:4416"
      Backup__Directory: "/home/micah/RiderProjects/FrostStream/data/core-backups"
      Backup__ToolPath: "dotnet"
      Backup__ToolBaseArguments: "run --project /home/micah/RiderProjects/FrostStream/src/App/BackupTool/BackupTool.csproj --"
      Backup__ArchiveDir: "/home/micah/RiderProjects/FrostStream/data/wal-archive"
      Backup__OpenBaoAddress: "http://openbao:8200"
      Backup__OpenBaoToken: "froststream-dev-root"
      Backup__OpenBaoKvMount: "secret"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-docker-demo-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "databridge"
    volumes:
      - type: "bind"
        source: "/home/micah/RiderProjects/FrostStream/data"
        target: "/home/micah/RiderProjects/FrostStream/data"
        read_only: false
    depends_on:
      postgres-init:
        condition: "service_completed_successfully"
      nats:
        condition: "service_started"
      openbao:
        condition: "service_started"
      typesense:
        condition: "service_started"
      pot-provider:
        condition: "service_started"
    networks:
      - "aspire"
  webapi:
    image: "${WEBAPI_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${WEBAPI_PORT}"
      ConnectionStrings__froststreamdb: "Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=froststreamdb"
      FROSTSTREAMDB_HOST: "postgres"
      FROSTSTREAMDB_PORT: "5432"
      FROSTSTREAMDB_USERNAME: "${POSTGRES_USER}"
      FROSTSTREAMDB_PASSWORD: "${POSTGRES_PASSWORD}"
      FROSTSTREAMDB_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/froststreamdb"
      FROSTSTREAMDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/froststreamdb"
      FROSTSTREAMDB_DATABASENAME: "froststreamdb"
      ConnectionStrings__nats: "nats://nats:${NATS_PASSWORD}@nats:4222"
      NATS_HOST: "nats"
      NATS_PORT: "4222"
      NATS_USERNAME: "nats"
      NATS_PASSWORD: "${NATS_PASSWORD}"
      NATS_URI: "nats://nats:${NATS_PASSWORD}@nats:4222"
      ASPNETCORE_URLS: "http://0.0.0.0:5041"
      OpenBao__Address: "http://openbao:8200"
      OpenBao__Token: "froststream-dev-root"
      FROSTSTREAM_STORAGE_ROOT: "/home/micah/RiderProjects/FrostStream/data"
      SINGLE_USER_MODE: "false"
      Auth__SingleUserMode: "false"
      Auth__AllowSingleUserModeInProduction: "false"
      Auth__Audience: "froststream-api"
      Auth__ClientId: "froststream-bff"
      Auth__RequireHttpsMetadata: "false"
      Auth__ExposeOpenApi: "false"
      OpenFga__StoreId: ""
      OpenFga__AuthorizationModelId: ""
      OpenFga__AutoProvision: "true"
      OpenFga__BootstrapOwnerSubjects: ""
      Cast__AdvertisedBaseUrl: ""
      Backup__Directory: "/home/micah/RiderProjects/FrostStream/data/core-backups"
      Backup__ToolPath: "dotnet"
      Backup__ToolBaseArguments: "run --project /home/micah/RiderProjects/FrostStream/src/App/BackupTool/BackupTool.csproj --"
      Backup__ArchiveDir: "/home/micah/RiderProjects/FrostStream/data/wal-archive"
      Backup__OpenBaoAddress: "http://openbao:8200"
      Backup__OpenBaoToken: "froststream-dev-root"
      Backup__OpenBaoKvMount: "secret"
      Auth__Authority: "http://authentik:9000/application/o/froststream/"
      OpenFga__Endpoint: "http://openfga:8080"
      Authentik__ApiUrl: "http://authentik:9000"
      Authentik__ApiToken: "${AUTHENTIK_BOOTSTRAP_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-docker-demo-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "webapi"
    volumes:
      - type: "bind"
        source: "/home/micah/RiderProjects/FrostStream/data"
        target: "/home/micah/RiderProjects/FrostStream/data"
        read_only: false
    expose:
      - "${WEBAPI_PORT}"
    depends_on:
      postgres-init:
        condition: "service_completed_successfully"
      nats:
        condition: "service_started"
      openbao:
        condition: "service_started"
      authentik:
        condition: "service_started"
      openfga:
        condition: "service_started"
    networks:
      - "aspire"
  worker:
    image: "${WORKER_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ConnectionStrings__nats: "nats://nats:${NATS_PASSWORD}@nats:4222"
      NATS_HOST: "nats"
      NATS_PORT: "4222"
      NATS_USERNAME: "nats"
      NATS_PASSWORD: "${NATS_PASSWORD}"
      NATS_URI: "nats://nats:${NATS_PASSWORD}@nats:4222"
      OpenBao__Address: "http://openbao:8200"
      OpenBao__Token: "froststream-dev-root"
      FROSTSTREAM_STORAGE_ROOT: "/home/micah/RiderProjects/FrostStream/data"
      PotProvider__Enabled: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-docker-demo-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "worker"
    volumes:
      - type: "bind"
        source: "/home/micah/RiderProjects/FrostStream/data"
        target: "/home/micah/RiderProjects/FrostStream/data"
        read_only: false
    depends_on:
      nats:
        condition: "service_started"
      openbao:
        condition: "service_started"
    networks:
      - "aspire"
  scheduler:
    image: "${SCHEDULER_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${SCHEDULER_PORT}"
      ConnectionStrings__nats: "nats://nats:${NATS_PASSWORD}@nats:4222"
      NATS_HOST: "nats"
      NATS_PORT: "4222"
      NATS_USERNAME: "nats"
      NATS_PASSWORD: "${NATS_PASSWORD}"
      NATS_URI: "nats://nats:${NATS_PASSWORD}@nats:4222"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-docker-demo-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "scheduler"
    expose:
      - "${SCHEDULER_PORT}"
    depends_on:
      nats:
        condition: "service_started"
      databridge:
        condition: "service_started"
    networks:
      - "aspire"
  frontend:
    image: "${FRONTEND_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      PORT: "${FRONTEND_PORT}"
      ORIGIN: "http://localhost:${FRONTEND_PORT}"
      API_BASE_URL: "http://webapi:${WEBAPI_PORT}"
      AUTH_AUTHORITY: "http://authentik:9000/application/o/froststream/"
      AUTH_PUBLIC_AUTHORITY: "http://localhost:9000/application/o/froststream/"
      AUTH_CLIENT_ID: "froststream-bff"
      AUTH_CLIENT_SECRET: "${AUTHENTIK_CLIENT_SECRET}"
      AUTH_SCOPES: "openid profile email groups offline_access"
      SINGLE_USER_MODE: "false"
      NODE_ENV: "production"
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    expose:
      - "${FRONTEND_PORT}"
    networks:
      - "aspire"      
networks:
  aspire:
    driver: "bridge"
volumes:
  apphost-feed4158f1-postgres-data:
    driver: "local"
  typesense-data:
    driver: "local"
