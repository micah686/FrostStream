name: Build and Publish Artifact

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.100
  NODE_VERSION: 22
  PNPM_VERSION: 10.28.1
  ASPIRE_CLI_VERSION: 13.4.6
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build-publish:
    name: Build, publish, and archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: FrostStream
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: FrostStream/src/App/Frontend/pnpm-lock.yaml

      - name: Install Aspire CLI
        run: |
          dotnet tool install --global Aspire.Cli --version "$ASPIRE_CLI_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build FrostStream
        working-directory: FrostStream
        run: dotnet build src/App/FrostStream.slnx --configuration Release

      - name: Publish Aspire artifacts
        working-directory: FrostStream/src/App
        run: aspire publish -o docker-compose-artifacts

      - name: Archive FrostStream folder
        run: tar -czf FrostStream.tar.gz FrostStream

      - name: Upload FrostStream artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrostStream
          path: FrostStream.tar.gz
          if-no-files-found: error
